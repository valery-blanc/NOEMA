server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Astro (SSG) génère /fr/ /es/ /en/ /de/ avec index.html ;
  # « / » redirige vers la langue par défaut.
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  # Cache long pour les assets fingerprintés d'Astro.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
