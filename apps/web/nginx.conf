# Détection de la langue du navigateur (Accept-Language) → locale du site.
# Défaut EN pour toute autre langue. Doit être au niveau http (conf.d est inclus dans http).
map $http_accept_language $noema_lang {
  default   en;
  ~*^es     es;
  ~*^en     en;
  ~*^fr     fr;
  ~*^de     de;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Racine « / » → redirection 302 serveur (sans page blanche) vers la langue du navigateur.
  location = / {
    add_header Vary Accept-Language;
    return 302 /$noema_lang/;
  }

  # Astro (SSG) génère /fr/ /es/ /en/ /de/ avec index.html.
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  # Cache long pour les assets fingerprintés d'Astro.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
