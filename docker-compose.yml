# NOÊMA — orchestration (prod Avignon : Traefik + TLS sur réseau externe `web`).
# postgres → cms-migrate → cms (Payload/Next) → publisher (build SSG à la demande)
#   → web (nginx, public) + preview (nginx, aperçu protégé).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 12

  # Applique les migrations Payload (schéma Postgres) avant de démarrer le CMS.
  # En prod, le schéma est géré par migrations versionnées (pas de push auto).
  cms-migrate:
    build:
      context: ./apps/cms
      target: builder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NODE_ENV: production
    command: ['sh', '-lc', 'pnpm payload migrate']
    networks: [internal]
    restart: 'no'

  cms:
    build:
      context: ./apps/cms
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      cms-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: https://${ADMIN_HOST}
      NODE_ENV: production
      PUBLISHER_URL: http://publisher:9000
      PUBLISH_TOKEN: ${PUBLISH_TOKEN}
      PREVIEW_SITE_URL: ${PREVIEW_SITE_URL}
    networks: [internal, web]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.noema-cms.rule=Host(`${ADMIN_HOST}`)
      - traefik.http.routers.noema-cms.entrypoints=${TRAEFIK_ENTRYPOINT}
      - traefik.http.routers.noema-cms.tls.certresolver=${CERT_RESOLVER}
      # Priorité > wildcard *.zitoon.com (platform-sites priority=1) sur Avignon.
      - traefik.http.routers.noema-cms.priority=100
      - traefik.http.services.noema-cms.loadbalancer.server.port=3000

  # Reconstruit le statique à la demande (boutons admin) vers web_dist (public)
  # et web_preview (aperçu). Build initial des deux au démarrage. Réseau interne only.
  publisher:
    build:
      context: ./apps/web
    restart: unless-stopped
    depends_on:
      cms:
        condition: service_started
    environment:
      CMS_INTERNAL_URL: http://cms:3000
      PUBLIC_SITE_URL: https://${PUBLIC_HOST}
      PREVIEW_SITE_URL: ${PREVIEW_SITE_URL}
      PUBLISH_TOKEN: ${PUBLISH_TOKEN}
    volumes:
      - web_dist:/out/public
      - web_preview:/out/preview
    networks: [internal]
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://localhost:9000/health']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      publisher:
        condition: service_healthy
    volumes:
      - web_dist:/usr/share/nginx/html:ro
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [web]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.noema-web.rule=Host(`${PUBLIC_HOST}`)
      - traefik.http.routers.noema-web.entrypoints=${TRAEFIK_ENTRYPOINT}
      - traefik.http.routers.noema-web.tls.certresolver=${CERT_RESOLVER}
      # Priorité > wildcard *.zitoon.com (platform-sites priority=1) sur Avignon.
      - traefik.http.routers.noema-web.priority=100
      - traefik.http.services.noema-web.loadbalancer.server.port=80

  # Site d'aperçu : contenu sauvegardé, reconstruit via le bouton « Aperçu ».
  # Accès distant protégé par mot de passe (basic-auth) + non indexé.
  preview:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      publisher:
        condition: service_healthy
    volumes:
      - web_preview:/usr/share/nginx/html:ro
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [web]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.noema-preview.rule=Host(`${PREVIEW_HOST}`)
      - traefik.http.routers.noema-preview.entrypoints=${TRAEFIK_ENTRYPOINT}
      - traefik.http.routers.noema-preview.tls.certresolver=${CERT_RESOLVER}
      - traefik.http.routers.noema-preview.priority=100
      - traefik.http.routers.noema-preview.middlewares=noema-preview-auth,noema-preview-noindex
      - traefik.http.middlewares.noema-preview-auth.basicauth.users=${PREVIEW_BASICAUTH}
      - traefik.http.middlewares.noema-preview-noindex.headers.customresponseheaders.X-Robots-Tag=noindex, nofollow
      - traefik.http.services.noema-preview.loadbalancer.server.port=80

networks:
  web:
    external: true
    name: ${TRAEFIK_NETWORK}
  internal:
    driver: bridge

volumes:
  pg_data:
  web_dist:
  web_preview:
